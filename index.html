<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>6sense — Data Exports (Reporting capability)</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
/* ============================================================
   6sense Design System — Colors & Type Tokens
   ============================================================
   Canonical CSS variables for the 6sense brand. Import once
   at the root of any artifact: <link rel="stylesheet" href="colors_and_type.css">
   ============================================================ */

/* ---------- Fonts ----------
   The brand mandates Aptos Display (headings) + Aptos (body).
   Aptos is a Microsoft system font — NOT on Google Fonts.
   Substitution fallback: Inter Tight (closest humanist geometric grotesque).
   See README.md → CAVEATS.
*/
@import url('https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&display=swap');

:root {
  /* ========== PRIMARY ========== */
  --c-midnight:   #192232;  /* primary dark */
  --c-white:      #FFFFFF;  /* primary light */
  --c-teal:       #13BBB2;  /* brand primary */

  /* ========== TEXT ========== */
  --c-slate:      #4A5568;  /* body on light */
  --c-cool-gray:  #8A9BAE;  /* secondary text */
  --c-silver:     #C8D3DE;  /* body on dark */

  /* ========== ACCENT ========== */
  --c-deep-teal:    #007377;  /* section headers, eyebrows */
  --c-dark-teal:    #174951;  /* dark card fill, dark bg */
  --c-ice-mint:     #B2F4EF;  /* separators on white */
  --c-bright-cyan:  #5EF7EB;  /* arrows on dark */
  --c-forest-green: #15855E;  /* secondary badges */
  --c-blue:         #1F8ED6;  /* charts, links */
  --c-navy:         #1C5883;  /* tertiary badges */

  /* ========== SURFACES ========== */
  --c-light-gray:  #F4F4F4;  /* card fill on white */
  --c-border-gray: #E0E0E0;  /* card border on white */

  /* ========== SEMANTIC (light / white bg) ========== */
  --fg-1:        var(--c-midnight);    /* titles */
  --fg-2:        var(--c-slate);       /* body */
  --fg-3:        var(--c-cool-gray);   /* secondary */
  --fg-accent:   var(--c-deep-teal);   /* eyebrow, accent copy */
  --fg-link:     var(--c-blue);
  --bg-page:     var(--c-white);
  --bg-card:     var(--c-light-gray);
  --bd-card:     var(--c-border-gray);
  --bd-divider:  var(--c-ice-mint);

  /* ========== SEMANTIC (dark) — apply .dark / .teal-bg ========== */
  /* Overridden in block below */

  /* ========== TYPOGRAPHY ========== */
  --font-display: 'Aptos Display', 'Inter Tight', 'Aptos', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
  --font-body:    'Aptos', 'Inter Tight', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;

  /* Display scale — in pt (slide units). Use --px variants for HTML. */
  --t-hero:        42pt;  /* cover hero title */
  --t-statement:   32pt;  /* large statement / divider */
  --t-h2:          26pt;  /* slide subtitle */
  --t-h3:          22pt;  /* secondary heading */
  --t-banner:      16pt;  /* banner / platform title */
  --t-card-title:  14pt;  /* card title */
  --t-label:       13pt;  /* competitor / tier label */
  --t-eyebrow:      9pt;  /* section eyebrow (tracked, upper) */

  /* Body scale */
  --t-subtitle:     12pt;
  --t-body:         11pt;
  --t-body-sm:      10pt;
  --t-foot:        9.5pt;
  --t-table:         9pt;

  /* Px equivalents (1pt ≈ 1.333px) for HTML/web artifacts */
  --px-hero:       56px;
  --px-statement:  42px;
  --px-h2:         34px;
  --px-h3:         29px;
  --px-banner:     21px;
  --px-card-title: 19px;
  --px-label:      17px;
  --px-eyebrow:    12px;
  --px-subtitle:   16px;
  --px-body:       15px;
  --px-body-sm:    14px;
  --px-foot:       13px;
  --px-table:      12px;

  /* Weights */
  --fw-regular: 400;
  --fw-medium:  500;
  --fw-semi:    600;
  --fw-bold:    700;
  --fw-black:   800;

  /* Line heights */
  --lh-tight:  1.08;
  --lh-snug:   1.22;
  --lh-body:   1.42;
  --lh-loose:  1.6;

  /* Letter spacing */
  --ls-eyebrow: 0.12em;  /* tracked caps */
  --ls-display: -0.01em;
  --ls-tight:   -0.02em;

  /* ========== GEOMETRY ========== */
  --radius-card:   10px;   /* ~0.100" at slide scale */
  --radius-chip:   999px;
  --radius-xs:     4px;
  --radius-sm:     6px;
  --radius-md:     10px;
  --radius-lg:     14px;

  /* Borders */
  --bw-hair:   0.5pt;      /* card borders */
  --bw-rule:   0.75pt;     /* separator lines */
  --bw-accent: 2pt;        /* accent lines under section dividers */

  /* Shadows — subtle; brand prefers flat fills */
  --shadow-card:   0 1px 2px rgba(25, 34, 50, 0.06);
  --shadow-lifted: 0 4px 16px rgba(25, 34, 50, 0.08);

  /* Slide geometry (10" × 5.625") */
  --slide-w:        10in;
  --slide-h:        5.625in;
  --slide-margin-x: 0.80in;
  --slide-margin-t: 0.40in;
  --slide-margin-t-cover: 1.20in;
  --slide-content-w: 8.40in;
  --slide-gap-3col:  0.30in;
  --slide-gap-2col:  0.60in;
}

/* ========== DARK / TEAL SURFACE OVERRIDES ========== */
.surface-midnight,
.surface-dark-teal,
.surface-teal {
  --fg-1:       var(--c-white);
  --fg-2:       var(--c-silver);
  --fg-3:       var(--c-silver);
  --fg-accent:  var(--c-teal);
  --bg-card:    var(--c-dark-teal);
  --bd-card:    var(--c-deep-teal);
  --bd-divider: var(--c-teal);
}
.surface-midnight   { background: var(--c-midnight); color: var(--c-white); }
.surface-dark-teal  { background: var(--c-dark-teal); color: var(--c-white); }
.surface-teal       { background: var(--c-teal); color: var(--c-white); }
.surface-white      { background: var(--c-white); color: var(--c-midnight); }

/* ========== BASE ELEMENTS ========== */
.ds-body,
.ds-root {
  font-family: var(--font-body);
  font-size: var(--px-body);
  line-height: var(--lh-body);
  color: var(--fg-2);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.ds-eyebrow {
  font-family: var(--font-display);
  font-weight: var(--fw-bold);
  font-size: var(--px-eyebrow);
  letter-spacing: var(--ls-eyebrow);
  text-transform: uppercase;
  color: var(--fg-accent);
}

.ds-hero {
  font-family: var(--font-display);
  font-weight: var(--fw-bold);
  font-size: var(--px-hero);
  line-height: var(--lh-tight);
  letter-spacing: var(--ls-display);
  color: var(--fg-1);
}

.ds-h2 {
  font-family: var(--font-display);
  font-weight: var(--fw-bold);
  font-size: var(--px-h2);
  line-height: var(--lh-snug);
  letter-spacing: var(--ls-display);
  color: var(--fg-1);
  margin: 0;
}

.ds-h3 {
  font-family: var(--font-display);
  font-weight: var(--fw-bold);
  font-size: var(--px-h3);
  line-height: var(--lh-snug);
  color: var(--fg-1);
  margin: 0;
}

.ds-banner-title {
  font-family: var(--font-display);
  font-weight: var(--fw-bold);
  font-size: var(--px-banner);
  color: var(--fg-1);
}

.ds-card-title {
  font-family: var(--font-display);
  font-weight: var(--fw-bold);
  font-size: var(--px-card-title);
  color: var(--fg-1);
  margin: 0;
}

.ds-label {
  font-family: var(--font-display);
  font-weight: var(--fw-bold);
  font-size: var(--px-label);
  color: var(--fg-1);
}

.ds-subtitle {
  font-family: var(--font-body);
  font-size: var(--px-subtitle);
  color: var(--fg-3);
  font-weight: var(--fw-regular);
}

.ds-p {
  font-family: var(--font-body);
  font-size: var(--px-body);
  line-height: var(--lh-body);
  color: var(--fg-2);
}

.ds-p-sm  { font-size: var(--px-body-sm); }
.ds-foot  { font-size: var(--px-foot); color: var(--fg-3); }

.ds-link {
  color: var(--fg-link);
  text-decoration: none;
  border-bottom: 1px solid currentColor;
}
.ds-link:hover { opacity: 0.8; }

/* ========== CARDS ========== */
.ds-card {
  background: var(--bg-card);
  border: 0.5pt solid var(--bd-card);
  border-radius: var(--radius-card);
  padding: 18px 20px;
}
.ds-card--banner {
  background: var(--c-midnight);
  border-color: var(--c-dark-teal);
  color: var(--c-white);
}
.ds-card--banner .ds-card-title { color: var(--c-white); }

/* ========== DIVIDERS ========== */
.ds-rule {
  height: 0;
  border: 0;
  border-top: 0.75pt solid var(--bd-divider);
  margin: 12px 0;
}
.ds-accent-bar {
  display: block;
  width: 2in;
  height: 2pt;
  background: var(--c-teal);
}

/* ========== BADGES ========== */
.ds-badge {
  display: inline-flex;
  align-items: center;
  height: 22px;
  padding: 0 10px;
  border-radius: 999px;
  font-family: var(--font-display);
  font-weight: var(--fw-bold);
  font-size: 11px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  background: var(--c-teal);
  color: var(--c-white);
}
.ds-badge--forest { background: var(--c-forest-green); }
.ds-badge--navy   { background: var(--c-navy); }
.ds-badge--blue   { background: var(--c-blue); }
.ds-badge--outline{
  background: transparent;
  color: var(--c-deep-teal);
  box-shadow: inset 0 0 0 1px var(--c-deep-teal);
}

/* ========== BUTTONS ========== */
.ds-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  height: 40px;
  padding: 0 18px;
  border-radius: 8px;
  font-family: var(--font-display);
  font-weight: var(--fw-bold);
  font-size: 14px;
  letter-spacing: 0.01em;
  border: 0;
  cursor: pointer;
  transition: background 120ms ease, color 120ms ease, transform 120ms ease;
}
.ds-btn--primary {
  background: var(--c-teal);
  color: var(--c-white);
}
.ds-btn--primary:hover  { background: var(--c-deep-teal); }
.ds-btn--primary:active { transform: translateY(1px); }

.ds-btn--dark {
  background: var(--c-midnight);
  color: var(--c-white);
}
.ds-btn--dark:hover { background: #273349; }

.ds-btn--ghost {
  background: transparent;
  color: var(--c-midnight);
  box-shadow: inset 0 0 0 1px var(--c-midnight);
}
.ds-btn--ghost:hover { background: rgba(25, 34, 50, 0.05); }

.ds-btn--on-dark {
  background: var(--c-white);
  color: var(--c-midnight);
}
.ds-btn--on-dark:hover { background: var(--c-silver); }

html, body { margin: 0; padding: 0; height: 100%; background: #f0eee9; font-family: 'Inter Tight', system-ui, sans-serif; color: #192232; }
*, *::before, *::after { box-sizing: border-box; }
@keyframes pulse { 0%, 100% { opacity: 1 } 50% { opacity: .5 } }
code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
.app-root ::-webkit-scrollbar { width: 10px; height: 10px; }
.app-root ::-webkit-scrollbar-thumb { background: rgba(25,34,50,.18); border-radius: 6px; }
.app-root ::-webkit-scrollbar-track { background: transparent; }
.tw-panel {
  position: fixed; right: 20px; bottom: 20px; width: 280px;
  background: #fff; border-radius: 12px; z-index: 10000;
  border: 1px solid #E6E8EC; box-shadow: 0 10px 30px rgba(25,34,50,.14);
  padding: 16px; font-family: 'Inter Tight', system-ui, sans-serif;
  display: none;
}
.tw-panel.open { display: block; }
.tw-title { font-family: 'Inter Tight'; font-weight: 800; font-size: 14px; color: #192232; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; letter-spacing: -0.01em; }
.tw-label { font-size: 11px; font-weight: 700; letter-spacing: .1em; color: #8A9BAE; text-transform: uppercase; margin: 12px 0 6px; }
.tw-row { display: flex; gap: 6px; flex-wrap: wrap; }
.tw-chip { padding: 5px 10px; border-radius: 999px; background: #F4F4F4; color: #4A5568; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid transparent; }
.tw-chip.on { background: #192232; color: #fff; }
#tw-toggle {
  position: fixed; right: 20px; bottom: 20px; z-index: 9999;
  width: 40px; height: 40px; border-radius: 10px;
  background: #192232; color: #fff; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 12px rgba(25,34,50,.3); font-size: 18px;
  transition: background 120ms;
}
#tw-toggle:hover { background: #273349; }
.tw-panel.open ~ #tw-toggle { display: none; }
</style>
</head>

<div class="tw-panel open" id="tw-panel">

    Variations live side-by-side on the canvas — pan/zoom to explore, or click any artboard's ⤢ icon to focus it full-screen. Press <kbd style="background:#F4F4F4;border-radius:3px;padding:1px 4px;font-size:10px;font-family:ui-monospace,monospace">Shift+T</kbd> to re-open.
  </div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">

// DesignCanvas.jsx — Figma-ish design canvas wrapper
// Warm gray grid bg + Sections + Artboards + PostIt notes.
// Artboards are reorderable (grip-drag), labels/titles are inline-editable,
// and any artboard can be opened in a fullscreen focus overlay (←/→/Esc).
// State persists to a .design-canvas.state.json sidecar via the host
// bridge. No assets, no deps.
//
// Usage:
//   <DesignCanvas>
//     <DCSection id="onboarding" title="Onboarding" subtitle="First-run variants">
//       <DCArtboard id="a" label="A · Dusk" width={260} height={480}>…</DCArtboard>
//       <DCArtboard id="b" label="B · Minimal" width={260} height={480}>…</DCArtboard>
//     </DCSection>
//   </DesignCanvas>

const DC = {
  bg: '#f0eee9',
  grid: 'rgba(0,0,0,0.06)',
  label: 'rgba(60,50,40,0.7)',
  title: 'rgba(40,30,20,0.85)',
  subtitle: 'rgba(60,50,40,0.6)',
  postitBg: '#fef4a8',
  postitText: '#5a4a2a',
  font: '-apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif',
};

// One-time CSS injection (classes are dc-prefixed so they don't collide with
// the hosted design's own styles).
if (typeof document !== 'undefined' && !document.getElementById('dc-styles')) {
  const s = document.createElement('style');
  s.id = 'dc-styles';
  s.textContent = [
    '.dc-editable{cursor:text;outline:none;white-space:nowrap;border-radius:3px;padding:0 2px;margin:0 -2px}',
    '.dc-editable:focus{background:#fff;box-shadow:0 0 0 1.5px #c96442}',
    '[data-dc-slot]{transition:transform .18s cubic-bezier(.2,.7,.3,1)}',
    '[data-dc-slot].dc-dragging{transition:none;z-index:10;pointer-events:none}',
    '[data-dc-slot].dc-dragging .dc-card{box-shadow:0 12px 40px rgba(0,0,0,.25),0 0 0 2px #c96442;transform:scale(1.02)}',
    '.dc-card{transition:box-shadow .15s,transform .15s}',
    '.dc-card *{scrollbar-width:none}',
    '.dc-card *::-webkit-scrollbar{display:none}',
    '.dc-labelrow{display:flex;align-items:center;gap:4px;height:24px}',
    '.dc-grip{cursor:grab;display:flex;align-items:center;padding:5px 4px;border-radius:4px;transition:background .12s}',
    '.dc-grip:hover{background:rgba(0,0,0,.08)}',
    '.dc-grip:active{cursor:grabbing}',
    '.dc-labeltext{cursor:pointer;border-radius:4px;padding:3px 6px;display:flex;align-items:center;transition:background .12s}',
    '.dc-labeltext:hover{background:rgba(0,0,0,.05)}',
    '.dc-expand{position:absolute;bottom:100%;right:0;margin-bottom:5px;z-index:2;opacity:0;transition:opacity .12s,background .12s;',
    '  width:22px;height:22px;border-radius:5px;border:none;cursor:pointer;padding:0;',
    '  background:transparent;color:rgba(60,50,40,.7);display:flex;align-items:center;justify-content:center}',
    '.dc-expand:hover{background:rgba(0,0,0,.06);color:#2a251f}',
    '[data-dc-slot]:hover .dc-expand{opacity:1}',
  ].join('\n');
  document.head.appendChild(s);
}

const DCCtx = React.createContext(null);

// ─────────────────────────────────────────────────────────────
// DesignCanvas — stateful wrapper around the pan/zoom viewport.
// Owns runtime state (per-section order, renamed titles/labels, focused
// artboard). Order/titles/labels persist to a .design-canvas.state.json
// sidecar next to the HTML. Reads go via plain fetch() so the saved
// arrangement is visible anywhere the HTML + sidecar are served together
// (omelette preview, direct link, downloaded zip). Writes go through the
// host's window.omelette bridge — editing requires the omelette runtime.
// Focus is ephemeral.
// ─────────────────────────────────────────────────────────────
const DC_STATE_FILE = '.design-canvas.state.json';

function DesignCanvas({ children, minScale, maxScale, style }) {
  const [state, setState] = React.useState({ sections: {}, focus: null });
  // Hold rendering until the sidecar read settles so the saved order/titles
  // appear on first paint (no source-order flash). didRead gates writes until
  // the read settles so the empty initial state can't clobber a slow read;
  // skipNextWrite suppresses the one echo-write that would otherwise follow
  // hydration.
  const [ready, setReady] = React.useState(false);
  const didRead = React.useRef(false);
  const skipNextWrite = React.useRef(false);

  React.useEffect(() => {
    let off = false;
    fetch('./' + DC_STATE_FILE)
      .then((r) => (r.ok ? r.json() : null))
      .then((saved) => {
        if (off || !saved || !saved.sections) return;
        skipNextWrite.current = true;
        setState((s) => ({ ...s, sections: saved.sections }));
      })
      .catch(() => {})
      .finally(() => { didRead.current = true; if (!off) setReady(true); });
    const t = setTimeout(() => { if (!off) setReady(true); }, 150);
    return () => { off = true; clearTimeout(t); };
  }, []);

  React.useEffect(() => {
    if (!didRead.current) return;
    if (skipNextWrite.current) { skipNextWrite.current = false; return; }
    const t = setTimeout(() => {
      window.omelette?.writeFile(DC_STATE_FILE, JSON.stringify({ sections: state.sections })).catch(() => {});
    }, 250);
    return () => clearTimeout(t);
  }, [state.sections]);

  // Build registries synchronously from children so FocusOverlay can read
  // them in the same render. Only direct DCSection > DCArtboard children are
  // walked — wrapping them in other elements opts out of focus/reorder.
  const registry = {};     // slotId -> { sectionId, artboard }
  const sectionMeta = {};  // sectionId -> { title, subtitle, slotIds[] }
  const sectionOrder = [];
  React.Children.forEach(children, (sec) => {
    if (!sec || sec.type !== DCSection) return;
    const sid = sec.props.id ?? sec.props.title;
    if (!sid) return;
    sectionOrder.push(sid);
    const persisted = state.sections[sid] || {};
    const srcIds = [];
    React.Children.forEach(sec.props.children, (ab) => {
      if (!ab || ab.type !== DCArtboard) return;
      const aid = ab.props.id ?? ab.props.label;
      if (!aid) return;
      registry[`${sid}/${aid}`] = { sectionId: sid, artboard: ab };
      srcIds.push(aid);
    });
    const kept = (persisted.order || []).filter((k) => srcIds.includes(k));
    sectionMeta[sid] = {
      title: persisted.title ?? sec.props.title,
      subtitle: sec.props.subtitle,
      slotIds: [...kept, ...srcIds.filter((k) => !kept.includes(k))],
    };
  });

  const api = React.useMemo(() => ({
    state,
    section: (id) => state.sections[id] || {},
    patchSection: (id, p) => setState((s) => ({
      ...s,
      sections: { ...s.sections, [id]: { ...s.sections[id], ...(typeof p === 'function' ? p(s.sections[id] || {}) : p) } },
    })),
    setFocus: (slotId) => setState((s) => ({ ...s, focus: slotId })),
  }), [state]);

  // Esc exits focus; any outside pointerdown commits an in-progress rename.
  React.useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') api.setFocus(null); };
    const onPd = (e) => {
      const ae = document.activeElement;
      if (ae && ae.isContentEditable && !ae.contains(e.target)) ae.blur();
    };
    document.addEventListener('keydown', onKey);
    document.addEventListener('pointerdown', onPd, true);
    return () => {
      document.removeEventListener('keydown', onKey);
      document.removeEventListener('pointerdown', onPd, true);
    };
  }, [api]);

  return (
    <DCCtx.Provider value={api}>
      <DCViewport minScale={minScale} maxScale={maxScale} style={style}>{ready && children}</DCViewport>
      {state.focus && registry[state.focus] && (
        <DCFocusOverlay entry={registry[state.focus]} sectionMeta={sectionMeta} sectionOrder={sectionOrder} />
      )}
    </DCCtx.Provider>
  );
}

// ─────────────────────────────────────────────────────────────
// DCViewport — transform-based pan/zoom (internal)
//
// Input mapping (Figma-style):
//   • trackpad pinch  → zoom   (ctrlKey wheel; Safari gesture* events)
//   • trackpad scroll → pan    (two-finger)
//   • mouse wheel     → zoom   (notched; distinguished from trackpad scroll)
//   • middle-drag / primary-drag-on-bg → pan
//
// Transform state lives in a ref and is written straight to the DOM
// (translate3d + will-change) so wheel ticks don't go through React —
// keeps pans at 60fps on dense canvases.
// ─────────────────────────────────────────────────────────────
function DCViewport({ children, minScale = 0.1, maxScale = 8, style = {} }) {
  const vpRef = React.useRef(null);
  const worldRef = React.useRef(null);
  const tf = React.useRef({ x: 0, y: 0, scale: 1 });

  const apply = React.useCallback(() => {
    const { x, y, scale } = tf.current;
    const el = worldRef.current;
    if (el) el.style.transform = `translate3d(${x}px, ${y}px, 0) scale(${scale})`;
  }, []);

  React.useEffect(() => {
    const vp = vpRef.current;
    if (!vp) return;

    const zoomAt = (cx, cy, factor) => {
      const r = vp.getBoundingClientRect();
      const px = cx - r.left, py = cy - r.top;
      const t = tf.current;
      const next = Math.min(maxScale, Math.max(minScale, t.scale * factor));
      const k = next / t.scale;
      // keep the world point under the cursor fixed
      t.x = px - (px - t.x) * k;
      t.y = py - (py - t.y) * k;
      t.scale = next;
      apply();
    };

    // Mouse-wheel vs trackpad-scroll heuristic. A physical wheel sends
    // line-mode deltas (Firefox) or large integer pixel deltas with no X
    // component (Chrome/Safari, typically multiples of 100/120). Trackpad
    // two-finger scroll sends small/fractional pixel deltas, often with
    // non-zero deltaX. ctrlKey is set by the browser for trackpad pinch.
    const isMouseWheel = (e) =>
      e.deltaMode !== 0 ||
      (e.deltaX === 0 && Number.isInteger(e.deltaY) && Math.abs(e.deltaY) >= 40);

    const onWheel = (e) => {
      e.preventDefault();
      if (isGesturing) return; // Safari: gesture* owns the pinch — discard concurrent wheels
      if (e.ctrlKey) {
        // trackpad pinch (or explicit ctrl+wheel)
        zoomAt(e.clientX, e.clientY, Math.exp(-e.deltaY * 0.01));
      } else if (isMouseWheel(e)) {
        // notched mouse wheel — fixed-ratio step per click
        zoomAt(e.clientX, e.clientY, Math.exp(-Math.sign(e.deltaY) * 0.18));
      } else {
        // trackpad two-finger scroll — pan
        tf.current.x -= e.deltaX;
        tf.current.y -= e.deltaY;
        apply();
      }
    };

    // Safari sends native gesture* events for trackpad pinch with a smooth
    // e.scale; preferring these over the ctrl+wheel fallback gives a much
    // better feel there. No-ops on other browsers. Safari also fires
    // ctrlKey wheel events during the same pinch — isGesturing makes
    // onWheel drop those entirely so they neither zoom nor pan.
    let gsBase = 1;
    let isGesturing = false;
    const onGestureStart = (e) => { e.preventDefault(); isGesturing = true; gsBase = tf.current.scale; };
    const onGestureChange = (e) => {
      e.preventDefault();
      zoomAt(e.clientX, e.clientY, (gsBase * e.scale) / tf.current.scale);
    };
    const onGestureEnd = (e) => { e.preventDefault(); isGesturing = false; };

    // Drag-pan: middle button anywhere, or primary button on canvas
    // background (anything that isn't an artboard or an inline editor).
    let drag = null;
    const onPointerDown = (e) => {
      const onBg = !e.target.closest('[data-dc-slot], .dc-editable');
      if (!(e.button === 1 || (e.button === 0 && onBg))) return;
      e.preventDefault();
      vp.setPointerCapture(e.pointerId);
      drag = { id: e.pointerId, lx: e.clientX, ly: e.clientY };
      vp.style.cursor = 'grabbing';
    };
    const onPointerMove = (e) => {
      if (!drag || e.pointerId !== drag.id) return;
      tf.current.x += e.clientX - drag.lx;
      tf.current.y += e.clientY - drag.ly;
      drag.lx = e.clientX; drag.ly = e.clientY;
      apply();
    };
    const onPointerUp = (e) => {
      if (!drag || e.pointerId !== drag.id) return;
      vp.releasePointerCapture(e.pointerId);
      drag = null;
      vp.style.cursor = '';
    };

    vp.addEventListener('wheel', onWheel, { passive: false });
    vp.addEventListener('gesturestart', onGestureStart, { passive: false });
    vp.addEventListener('gesturechange', onGestureChange, { passive: false });
    vp.addEventListener('gestureend', onGestureEnd, { passive: false });
    vp.addEventListener('pointerdown', onPointerDown);
    vp.addEventListener('pointermove', onPointerMove);
    vp.addEventListener('pointerup', onPointerUp);
    vp.addEventListener('pointercancel', onPointerUp);
    return () => {
      vp.removeEventListener('wheel', onWheel);
      vp.removeEventListener('gesturestart', onGestureStart);
      vp.removeEventListener('gesturechange', onGestureChange);
      vp.removeEventListener('gestureend', onGestureEnd);
      vp.removeEventListener('pointerdown', onPointerDown);
      vp.removeEventListener('pointermove', onPointerMove);
      vp.removeEventListener('pointerup', onPointerUp);
      vp.removeEventListener('pointercancel', onPointerUp);
    };
  }, [apply, minScale, maxScale]);

  const gridSvg = `url("data:image/svg+xml,%3Csvg width='120' height='120' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M120 0H0v120' fill='none' stroke='${encodeURIComponent(DC.grid)}' stroke-width='1'/%3E%3C/svg%3E")`;
  return (
    <div
      ref={vpRef}
      className="design-canvas"
      style={{
        height: '100vh', width: '100vw',
        background: DC.bg,
        overflow: 'hidden',
        overscrollBehavior: 'none',
        touchAction: 'none',
        position: 'relative',
        fontFamily: DC.font,
        boxSizing: 'border-box',
        ...style,
      }}
    >
      <div
        ref={worldRef}
        style={{
          position: 'absolute', top: 0, left: 0,
          transformOrigin: '0 0',
          willChange: 'transform',
          width: 'max-content', minWidth: '100%',
          minHeight: '100%',
          padding: '60px 0 80px',
        }}
      >
        <div style={{ position: 'absolute', inset: -6000, backgroundImage: gridSvg, backgroundSize: '120px 120px', pointerEvents: 'none', zIndex: -1 }} />
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// DCSection — editable title + h-row of artboards in persisted order
// ─────────────────────────────────────────────────────────────
function DCSection({ id, title, subtitle, children, gap = 48 }) {
  const ctx = React.useContext(DCCtx);
  const sid = id ?? title;
  const all = React.Children.toArray(children);
  const artboards = all.filter((c) => c && c.type === DCArtboard);
  const rest = all.filter((c) => !(c && c.type === DCArtboard));
  const srcOrder = artboards.map((a) => a.props.id ?? a.props.label);
  const sec = (ctx && sid && ctx.section(sid)) || {};

  const order = React.useMemo(() => {
    const kept = (sec.order || []).filter((k) => srcOrder.includes(k));
    return [...kept, ...srcOrder.filter((k) => !kept.includes(k))];
  }, [sec.order, srcOrder.join('|')]);

  const byId = Object.fromEntries(artboards.map((a) => [a.props.id ?? a.props.label, a]));

  return (
    <div data-dc-section={sid} style={{ marginBottom: 80, position: 'relative' }}>
      <div style={{ padding: '0 60px 56px' }}>
        <DCEditable tag="div" value={sec.title ?? title}
          onChange={(v) => ctx && sid && ctx.patchSection(sid, { title: v })}
          style={{ fontSize: 28, fontWeight: 600, color: DC.title, letterSpacing: -0.4, marginBottom: 6, display: 'inline-block' }} />
        {subtitle && <div style={{ fontSize: 16, color: DC.subtitle }}>{subtitle}</div>}
      </div>
      <div style={{ display: 'flex', gap, padding: '0 60px', alignItems: 'flex-start', width: 'max-content' }}>
        {order.map((k) => (
          <DCArtboardFrame key={k} sectionId={sid} artboard={byId[k]} order={order}
            label={(sec.labels || {})[k] ?? byId[k].props.label}
            onRename={(v) => ctx && ctx.patchSection(sid, (x) => ({ labels: { ...x.labels, [k]: v } }))}
            onReorder={(next) => ctx && ctx.patchSection(sid, { order: next })}
            onFocus={() => ctx && ctx.setFocus(`${sid}/${k}`)} />
        ))}
      </div>
      {rest}
    </div>
  );
}

// DCArtboard — marker; rendered by DCArtboardFrame via DCSection.
function DCArtboard() { return null; }

function DCArtboardFrame({ sectionId, artboard, label, order, onRename, onReorder, onFocus }) {
  const { id: rawId, label: rawLabel, width = 260, height = 480, children, style = {} } = artboard.props;
  const id = rawId ?? rawLabel;
  const ref = React.useRef(null);

  // Live drag-reorder: dragged card sticks to cursor; siblings slide into
  // their would-be slots in real time via transforms. DOM order only
  // changes on drop.
  const onGripDown = (e) => {
    e.preventDefault(); e.stopPropagation();
    const me = ref.current;
    // translateX is applied in local (pre-scale) space but pointer deltas and
    // getBoundingClientRect().left are screen-space — divide by the viewport's
    // current scale so the dragged card tracks the cursor at any zoom level.
    const scale = me.getBoundingClientRect().width / me.offsetWidth || 1;
    const peers = Array.from(document.querySelectorAll(`[data-dc-section="${sectionId}"] [data-dc-slot]`));
    const homes = peers.map((el) => ({ el, id: el.dataset.dcSlot, x: el.getBoundingClientRect().left }));
    const slotXs = homes.map((h) => h.x);
    const startIdx = order.indexOf(id);
    const startX = e.clientX;
    let liveOrder = order.slice();
    me.classList.add('dc-dragging');

    const layout = () => {
      for (const h of homes) {
        if (h.id === id) continue;
        const slot = liveOrder.indexOf(h.id);
        h.el.style.transform = `translateX(${(slotXs[slot] - h.x) / scale}px)`;
      }
    };

    const move = (ev) => {
      const dx = ev.clientX - startX;
      me.style.transform = `translateX(${dx / scale}px)`;
      const cur = homes[startIdx].x + dx;
      let nearest = 0, best = Infinity;
      for (let i = 0; i < slotXs.length; i++) {
        const d = Math.abs(slotXs[i] - cur);
        if (d < best) { best = d; nearest = i; }
      }
      if (liveOrder.indexOf(id) !== nearest) {
        liveOrder = order.filter((k) => k !== id);
        liveOrder.splice(nearest, 0, id);
        layout();
      }
    };

    const up = () => {
      document.removeEventListener('pointermove', move);
      document.removeEventListener('pointerup', up);
      const finalSlot = liveOrder.indexOf(id);
      me.classList.remove('dc-dragging');
      me.style.transform = `translateX(${(slotXs[finalSlot] - homes[startIdx].x) / scale}px)`;
      // After the settle transition, kill transitions + clear transforms +
      // commit the reorder in the same frame so there's no visual snap-back.
      setTimeout(() => {
        for (const h of homes) { h.el.style.transition = 'none'; h.el.style.transform = ''; }
        if (liveOrder.join('|') !== order.join('|')) onReorder(liveOrder);
        requestAnimationFrame(() => requestAnimationFrame(() => {
          for (const h of homes) h.el.style.transition = '';
        }));
      }, 180);
    };
    document.addEventListener('pointermove', move);
    document.addEventListener('pointerup', up);
  };

  return (
    <div ref={ref} data-dc-slot={id} style={{ position: 'relative', flexShrink: 0 }}>
      <div className="dc-labelrow" style={{ position: 'absolute', bottom: '100%', left: -4, marginBottom: 4, color: DC.label }}>
        <div className="dc-grip" onPointerDown={onGripDown} title="Drag to reorder">
          <svg width="9" height="13" viewBox="0 0 9 13" fill="currentColor"><circle cx="2" cy="2" r="1.1"/><circle cx="7" cy="2" r="1.1"/><circle cx="2" cy="6.5" r="1.1"/><circle cx="7" cy="6.5" r="1.1"/><circle cx="2" cy="11" r="1.1"/><circle cx="7" cy="11" r="1.1"/></svg>
        </div>
        <div className="dc-labeltext" onClick={onFocus} title="Click to focus">
          <DCEditable value={label} onChange={onRename} onClick={(e) => e.stopPropagation()}
            style={{ fontSize: 15, fontWeight: 500, color: DC.label, lineHeight: 1 }} />
        </div>
      </div>
      <button className="dc-expand" onClick={onFocus} onPointerDown={(e) => e.stopPropagation()} title="Focus">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"><path d="M7 1h4v4M5 11H1V7M11 1L7.5 4.5M1 11l3.5-3.5"/></svg>
      </button>
      <div className="dc-card"
        style={{ borderRadius: 2, boxShadow: '0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06)', overflow: 'hidden', width, height, background: '#fff', ...style }}>
        {children || <div style={{ height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#bbb', fontSize: 13, fontFamily: DC.font }}>{id}</div>}
      </div>
    </div>
  );
}

// Inline rename — commits on blur or Enter.
function DCEditable({ value, onChange, style, tag = 'span', onClick }) {
  const T = tag;
  return (
    <T className="dc-editable" contentEditable suppressContentEditableWarning
      onClick={onClick}
      onPointerDown={(e) => e.stopPropagation()}
      onBlur={(e) => onChange && onChange(e.currentTarget.textContent)}
      onKeyDown={(e) => { if (e.key === 'Enter') { e.preventDefault(); e.currentTarget.blur(); } }}
      style={style}>{value}</T>
  );
}

// ─────────────────────────────────────────────────────────────
// Focus mode — overlay one artboard; ←/→ within section, ↑/↓ across
// sections, Esc or backdrop click to exit.
// ─────────────────────────────────────────────────────────────
function DCFocusOverlay({ entry, sectionMeta, sectionOrder }) {
  const ctx = React.useContext(DCCtx);
  const { sectionId, artboard } = entry;
  const sec = ctx.section(sectionId);
  const meta = sectionMeta[sectionId];
  const peers = meta.slotIds;
  const aid = artboard.props.id ?? artboard.props.label;
  const idx = peers.indexOf(aid);
  const secIdx = sectionOrder.indexOf(sectionId);

  const go = (d) => { const n = peers[(idx + d + peers.length) % peers.length]; if (n) ctx.setFocus(`${sectionId}/${n}`); };
  const goSection = (d) => {
    const ns = sectionOrder[(secIdx + d + sectionOrder.length) % sectionOrder.length];
    const first = sectionMeta[ns] && sectionMeta[ns].slotIds[0];
    if (first) ctx.setFocus(`${ns}/${first}`);
  };

  React.useEffect(() => {
    const k = (e) => {
      if (e.key === 'ArrowLeft') { e.preventDefault(); go(-1); }
      if (e.key === 'ArrowRight') { e.preventDefault(); go(1); }
      if (e.key === 'ArrowUp') { e.preventDefault(); goSection(-1); }
      if (e.key === 'ArrowDown') { e.preventDefault(); goSection(1); }
    };
    document.addEventListener('keydown', k);
    return () => document.removeEventListener('keydown', k);
  });

  const { width = 260, height = 480, children } = artboard.props;
  const [vp, setVp] = React.useState({ w: window.innerWidth, h: window.innerHeight });
  React.useEffect(() => { const r = () => setVp({ w: window.innerWidth, h: window.innerHeight }); window.addEventListener('resize', r); return () => window.removeEventListener('resize', r); }, []);
  const scale = Math.max(0.1, Math.min((vp.w - 200) / width, (vp.h - 260) / height, 2));

  const [ddOpen, setDd] = React.useState(false);
  const Arrow = ({ dir, onClick }) => (
    <button onClick={(e) => { e.stopPropagation(); onClick(); }}
      style={{ position: 'absolute', top: '50%', [dir]: 28, transform: 'translateY(-50%)',
        border: 'none', background: 'rgba(255,255,255,.08)', color: 'rgba(255,255,255,.9)',
        width: 44, height: 44, borderRadius: 22, fontSize: 18, cursor: 'pointer',
        display: 'flex', alignItems: 'center', justifyContent: 'center', transition: 'background .15s' }}
      onMouseEnter={(e) => (e.currentTarget.style.background = 'rgba(255,255,255,.18)')}
      onMouseLeave={(e) => (e.currentTarget.style.background = 'rgba(255,255,255,.08)')}>
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
        <path d={dir === 'left' ? 'M11 3L5 9l6 6' : 'M7 3l6 6-6 6'} /></svg>
    </button>
  );

  // Portal to body so position:fixed is the real viewport regardless of any
  // transform on DesignCanvas's ancestors (including the canvas zoom itself).
  return ReactDOM.createPortal(
    <div onClick={() => ctx.setFocus(null)}
      onWheel={(e) => e.preventDefault()}
      style={{ position: 'fixed', inset: 0, zIndex: 100, background: 'rgba(24,20,16,.6)', backdropFilter: 'blur(14px)',
        fontFamily: DC.font, color: '#fff' }}>

      {/* top bar: section dropdown (left) · close (right) */}
      <div onClick={(e) => e.stopPropagation()}
        style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 72, display: 'flex', alignItems: 'flex-start', padding: '16px 20px 0', gap: 16 }}>
        <div style={{ position: 'relative' }}>
          <button onClick={() => setDd((o) => !o)}
            style={{ border: 'none', background: 'transparent', color: '#fff', cursor: 'pointer', padding: '6px 8px',
              borderRadius: 6, textAlign: 'left', fontFamily: 'inherit' }}>
            <span style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <span style={{ fontSize: 18, fontWeight: 600, letterSpacing: -0.3 }}>{meta.title}</span>
              <svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" style={{ opacity: .7 }}><path d="M2 4l3.5 3.5L9 4"/></svg>
            </span>
            {meta.subtitle && <span style={{ display: 'block', fontSize: 13, opacity: .6, fontWeight: 400, marginTop: 2 }}>{meta.subtitle}</span>}
          </button>
          {ddOpen && (
            <div style={{ position: 'absolute', top: '100%', left: 0, marginTop: 4, background: '#2a251f', borderRadius: 8,
              boxShadow: '0 8px 32px rgba(0,0,0,.4)', padding: 4, minWidth: 200, zIndex: 10 }}>
              {sectionOrder.map((sid) => (
                <button key={sid} onClick={() => { setDd(false); const f = sectionMeta[sid].slotIds[0]; if (f) ctx.setFocus(`${sid}/${f}`); }}
                  style={{ display: 'block', width: '100%', textAlign: 'left', border: 'none', cursor: 'pointer',
                    background: sid === sectionId ? 'rgba(255,255,255,.1)' : 'transparent', color: '#fff',
                    padding: '8px 12px', borderRadius: 5, fontSize: 14, fontWeight: sid === sectionId ? 600 : 400, fontFamily: 'inherit' }}>
                  {sectionMeta[sid].title}
                </button>
              ))}
            </div>
          )}
        </div>
        <div style={{ flex: 1 }} />
        <button onClick={() => ctx.setFocus(null)}
          onMouseEnter={(e) => (e.currentTarget.style.background = 'rgba(255,255,255,.12)')}
          onMouseLeave={(e) => (e.currentTarget.style.background = 'transparent')}
          style={{ border: 'none', background: 'transparent', color: 'rgba(255,255,255,.7)', width: 32, height: 32,
            borderRadius: 16, fontSize: 20, cursor: 'pointer', lineHeight: 1, transition: 'background .12s' }}>×</button>
      </div>

      {/* card centered, label + index below — only the card itself stops
          propagation so any backdrop click (including the margins around
          the card) exits focus */}
      <div
        style={{ position: 'absolute', top: 64, bottom: 56, left: 100, right: 100, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 16 }}>
        <div onClick={(e) => e.stopPropagation()} style={{ width: width * scale, height: height * scale, position: 'relative' }}>
          <div style={{ width, height, transform: `scale(${scale})`, transformOrigin: 'top left', background: '#fff', borderRadius: 2, overflow: 'hidden',
            boxShadow: '0 20px 80px rgba(0,0,0,.4)' }}>
            {children || <div style={{ height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#bbb' }}>{aid}</div>}
          </div>
        </div>
        <div onClick={(e) => e.stopPropagation()} style={{ fontSize: 14, fontWeight: 500, opacity: .85, textAlign: 'center' }}>
          {(sec.labels || {})[aid] ?? artboard.props.label}
          <span style={{ opacity: .5, marginLeft: 10, fontVariantNumeric: 'tabular-nums' }}>{idx + 1} / {peers.length}</span>
        </div>
      </div>

      <Arrow dir="left" onClick={() => go(-1)} />
      <Arrow dir="right" onClick={() => go(1)} />

      {/* dots */}
      <div onClick={(e) => e.stopPropagation()}
        style={{ position: 'absolute', bottom: 20, left: '50%', transform: 'translateX(-50%)', display: 'flex', gap: 8 }}>
        {peers.map((p, i) => (
          <button key={p} onClick={() => ctx.setFocus(`${sectionId}/${p}`)}
            style={{ border: 'none', padding: 0, cursor: 'pointer', width: 6, height: 6, borderRadius: 3,
              background: i === idx ? '#fff' : 'rgba(255,255,255,.3)' }} />
        ))}
      </div>
    </div>,
    document.body,
  );
}

// ─────────────────────────────────────────────────────────────
// Post-it — absolute-positioned sticky note
// ─────────────────────────────────────────────────────────────
function DCPostIt({ children, top, left, right, bottom, rotate = -2, width = 180 }) {
  return (
    <div style={{
      position: 'absolute', top, left, right, bottom, width,
      background: DC.postitBg, padding: '14px 16px',

  const colors = { success: '#15855E', partial: '#B7791F', failed: '#B42318', syncing: '#13BBB2', paused: '#8A9BAE' };
  return (
    <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}>

        boxShadow: status === 'syncing' ? '0 0 0 3px rgba(19,187,178,.25)' : 'none',
        animation: status === 'syncing' ? 'pulse 1.4s ease-in-out infinite' : 'none' }} />
    </span>
  );
}

function Button({ children, variant = 'primary', size = 'md', icon, trailingIcon, onClick, disabled, style: s }) {
  const base = {
    display: 'inline-flex', alignItems: 'center', gap: 8,
    height: size === 'sm' ? 32 : 40,
    padding: size === 'sm' ? '0 12px' : '0 16px',
    borderRadius: 8, border: 0, cursor: disabled ? 'not-allowed' : 'pointer',
    fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: size === 'sm' ? 13 : 14,
    letterSpacing: '0.01em', transition: 'background 120ms, color 120ms, transform 80ms',
    opacity: disabled ? 0.45 : 1, whiteSpace: 'nowrap',
  };
  const variants = {
    primary: { background: '#13BBB2', color: '#fff' },
    dark:    { background: '#192232', color: '#fff' },
    ghost:   { background: 'transparent', color: '#192232', boxShadow: 'inset 0 0 0 1px #D0D5DD' },
    subtle:  { background: '#F4F4F4', color: '#192232' },
    danger:  { background: '#fff', color: '#B42318', boxShadow: 'inset 0 0 0 1px #F5C2C0' },
  };
  return (
    <button onClick={onClick} disabled={disabled} style={{ ...base, ...variants[variant], ...s }}
      onMouseEnter={(e)=>{ if(!disabled){
        if(variant==='primary') e.currentTarget.style.background='#007377';
        if(variant==='dark') e.currentTarget.style.background='#273349';
        if(variant==='ghost') e.currentTarget.style.background='rgba(25,34,50,.04)';
        if(variant==='subtle') e.currentTarget.style.background='#EAEAEA';
      }}}
      onMouseLeave={(e)=>{ Object.assign(e.currentTarget.style, variants[variant]); }}>
      {icon}{children}{trailingIcon}
    </button>
  );
}

    <label style={{ display: 'block', ...style }}>

        <span style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 13, color: '#192232' }}>

        </span>

      </div>
      {children}
      {error && <div style={{ marginTop: 6, fontSize: 12, color: '#B42318' }}>{error}</div>}
    </label>
  );
}

}

function Checkbox({ checked, onChange, indeterminate }) {
  const ref = useRef(null);
  useEffect(() => { if (ref.current) ref.current.indeterminate = !!indeterminate; }, [indeterminate]);
  return (
    <span onClick={(e) => { e.stopPropagation(); onChange?.(!checked); }}
      style={{
        width: 18, height: 18, borderRadius: 5,
        background: checked || indeterminate ? '#13BBB2' : '#fff',
        border: `1.5px solid ${checked || indeterminate ? '#13BBB2' : '#CBD2DC'}`,
        display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
        cursor: 'pointer', flexShrink: 0, transition: 'all 120ms',
      }}>
      <input ref={ref} type="checkbox" checked={checked} onChange={()=>{}} style={{ display: 'none' }} />
      {checked && <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="m4 12 5 5 11-11"/></svg>}
      {!checked && indeterminate && <span style={{ width: 8, height: 2, background: '#fff', borderRadius: 1 }} />}
    </span>
  );
}

function Radio({ checked }) {
  return (
    <span style={{
      width: 18, height: 18, borderRadius: 999,

  if (!def) return null;
  return (
    <span style={{ position: 'relative', display: 'inline-block' }}>

          </div>
        </div>

    </span>
  );
}

<script type="text/babel" data-presets="react">
// WizardApp.jsx — Step-by-step wizard variation of the Data Export setup.
// Uses AppChrome + shared primitives from window.

const { useState: useStateW, useMemo: useMemoW, useEffect: useEffectW } = React;

function WizardApp() {

  const dest = DESTINATIONS.find(d => d.id === destId);
  const selectedCount = Object.values(selected).filter(Boolean).length;

  const runTest = () => {
    setTesting('running');
    setTimeout(() => setTesting('ok'), 1500);
  };

  const subnav = (
    <div style={{ borderBottom: '1px solid #E6E8EC', background: '#fff', padding: '0 24px', display: 'flex', gap: 24, flexShrink: 0 }}>

  // ───────── Landing (list of existing connections, with an empty state row) ─────────

              </p>
            </div>
          </div>

          {/* Existing connection card (simulated) */}
          <div style={{ background: '#fff', border: '1px solid #E6E8EC', borderRadius: 12, padding: 20, display: 'grid', gridTemplateColumns: '1fr auto', gap: 20, alignItems: 'center' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
              <div style={{ width: 40, height: 40, borderRadius: 8, background: '#29B5E815', color: '#29B5E8', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                <div style={{ width: 24, height: 24 }}>{DESTINATIONS[0].glyph}</div>
              </div>
              <div>
                <div style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 16, color: '#192232' }}>Acme — Snowflake prod <span style={{ fontSize: 11, color: '#8A9BAE', fontWeight: 500, marginLeft: 8 }}>acme-prod.us-east-1 · SIXSENSE_DATA.PROD</span></div>
                <div style={{ display: 'flex', gap: 14, marginTop: 6, fontSize: 12, color: '#4A5568' }}>
                  <span style={{ display:'inline-flex', gap: 6, alignItems:'center' }}><StatusDot status="success" />Healthy · Last sync 6m ago</span>
                  <span>5 datasets · 5.2M rows / day</span>
                  <span>Daily at 03:00 UTC</span>

                  Start from a template

                <PersonaTemplateCard key={tpl.id} tpl={tpl} onClick={() => setStepW(1)} />

  return (
    <AppChrome section="Data Exports / New export" subnav={subnav}
      topRight={
        <div style={{ display: 'flex', gap: 8 }}>
          <Button variant="ghost" size="sm" onClick={()=>setStepW(0)}>Cancel</Button>

      }>
      <div style={{ maxWidth: 920, margin: '0 auto' }}>
        <WizardStepper step={step} />

  const steps = ['Destination', 'Connect', 'Datasets', 'Schedule', 'Access', 'Review'];
  const active = Math.min(step, 6);
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 0, background: '#fff', border: '1px solid #E6E8EC', borderRadius: 12, padding: '14px 18px' }}>
      {steps.map((s, i) => {
        const n = i + 1;
        const done = n < active;
        const here = n === active;
        return (
          <React.Fragment key={s}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, minWidth: 0 }}>
              <div style={{
                width: 26, height: 26, borderRadius: 999,
                background: done ? '#13BBB2' : here ? '#192232' : '#F4F4F4',
                color: done || here ? '#fff' : '#8A9BAE',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 12,
              }}>
                {done ? <Icons.Check size={14} /> : n}
              </div>
              <div style={{ fontFamily: 'var(--font-display)', fontWeight: here ? 700 : 500, fontSize: 13, color: here ? '#192232' : done ? '#192232' : '#8A9BAE' }}>{s}</div>
            </div>
            {i < steps.length - 1 && (
              <div style={{ flex: 1, height: 2, background: done ? '#13BBB2' : '#E6E8EC', margin: '0 14px', minWidth: 12 }} />
            )}
          </React.Fragment>
        );
      })}
    </div>
  );
}

// ───────── Step 1: destination ─────────
function StepDestination({ destId, setDestId }) {
  const grouped = {
    'Cloud data warehouse': DESTINATIONS.filter(d => d.category === 'Cloud data warehouse'),
    'Object storage':       DESTINATIONS.filter(d => d.category === 'Object storage'),
  };
  return (
    <div style={{ padding: '28px 32px' }}>
      <StepHeader eyebrow="Step 1 · Destination" title="Where should 6sense send your data?" />
      {Object.entries(grouped).map(([group, items]) => (
        <div key={group} style={{ marginTop: 22 }}>
          <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.12em', color: '#8A9BAE', textTransform: 'uppercase', marginBottom: 10 }}>{group}</div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 10 }}>
            {items.map(d => {
              const active = destId === d.id;
              return (
                <div key={d.id} onClick={() => setDestId(d.id)} style={{
                  display: 'flex', alignItems: 'center', gap: 14, padding: '14px 16px',
                  borderRadius: 10, cursor: 'pointer',
                  border: `1.5px solid ${active ? '#13BBB2' : '#E6E8EC'}`,
                  background: active ? 'rgba(19,187,178,.05)' : '#fff',
                  transition: 'all 120ms',
                }}>
                  <div style={{ width: 36, height: 36, borderRadius: 8, background: d.color + '18', color: d.color, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                    <div style={{ width: 22, height: 22 }}>{d.glyph}</div>
                  </div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 14, color: '#192232' }}>{d.name}</div>
                    <div style={{ fontSize: 12, color: '#8A9BAE' }}>{d.category}</div>
                  </div>
                  <Radio checked={active} />
                </div>

            })}
          </div>
        </div>

}

// ───────── Step 2: connect ─────────
function StepConnect({ dest, conn, setConn, testing, runTest }) {
  const update = (k, v) => setConn({ ...conn, [k]: v });
  return (
    <div style={{ padding: '28px 32px' }}>
      <StepHeader eyebrow={`Step 2 · ${dest.name}`} title="Connection details" subtitle="We'll open an outbound connection from our secure egress. You don't need to allowlist individual IPs if you use PrivateLink." />

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16, marginTop: 20 }}>
        <Field label="Connection name" required>
          <Input value={conn.name} onChange={(v)=>update('name', v)} />
        </Field>
        <Field label="Account identifier" required hint="e.g. acme-prod.us-east-1">
          <Input value={conn.account} onChange={(v)=>update('account', v)} mono />
        </Field>
        <Field label="Warehouse" required>
          <Input value={conn.warehouse} onChange={(v)=>update('warehouse', v)} mono />
        </Field>
        <Field label="Role" required>
          <Input value={conn.role} onChange={(v)=>update('role', v)} mono />
        </Field>
        <Field label="Database" required>
          <Input value={conn.database} onChange={(v)=>update('database', v)} mono />
        </Field>
        <Field label="Schema" required>
          <Input value={conn.schema} onChange={(v)=>update('schema', v)} mono />
        </Field>
      </div>

      <div style={{ marginTop: 24, borderTop: '1px solid #E6E8EC', paddingTop: 22 }}>
        <div style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 14, color: '#192232', marginBottom: 10 }}>Authentication</div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
          {[
            { id: 'keypair', label: 'Key-pair auth', hint: 'Recommended — rotate every 90 days' },
            { id: 'oauth',   label: 'OAuth',         hint: 'Delegated; service account required' },
          ].map(opt => {
            const active = conn.authMethod === opt.id;
            return (
              <div key={opt.id} onClick={() => update('authMethod', opt.id)} style={{
                padding: 14, borderRadius: 10, cursor: 'pointer',
                border: `1.5px solid ${active ? '#13BBB2' : '#E6E8EC'}`,
                background: active ? 'rgba(19,187,178,.04)' : '#fff',
                display: 'flex', alignItems: 'flex-start', gap: 12,
              }}>
                <Radio checked={active} />
                <div>
                  <div style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 13, color: '#192232' }}>{opt.label}</div>
                  <div style={{ fontSize: 12, color: '#8A9BAE', marginTop: 2 }}>{opt.hint}</div>
                </div>
              </div>
            );
          })}
        </div>

        {conn.authMethod === 'keypair' && (
          <div style={{ marginTop: 16, display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
            <Field label="Service user" required><Input mono value={conn.user} onChange={(v)=>update('user', v)} /></Field>
            <Field label="6sense public key" hint="Copy into your Snowflake user">
              <Input readOnly mono value="RSA PUBLIC KEY · MIIBIjAN…wIDAQAB" icon={<Icons.Key size={14} />} />
            </Field>
          </div>
        )}

        <div style={{ marginTop: 18, display: 'flex', alignItems: 'center', gap: 12, padding: '12px 14px', borderRadius: 10, background: testing==='ok'?'#E6F6EF':testing==='fail'?'#FDECEC':'#F4F4F4' }}>
          <div style={{ color: testing==='ok'?'#15855E':testing==='fail'?'#B42318':'#8A9BAE', display:'flex' }}>
            {testing === 'running' ? <Icons.Refresh size={16} /> :
             testing === 'ok'      ? <Icons.Check size={16} /> :
             testing === 'fail'    ? <Icons.AlertTri size={16} /> : <Icons.Plug size={16} />}
          </div>
          <div style={{ fontSize: 13, color: '#192232', flex: 1 }}>
            {testing === 'running' && <span>Testing connection to <b>{conn.account}</b>…</span>}
            {testing === 'ok' && <span><b>Connection verified.</b> Handshake, warehouse, schema write test all passed — 412ms.</span>}
            {testing === 'fail' && <span>Authentication failed. Check that the public key is installed on user <code>{conn.user}</code>.</span>}
            {!testing && <span>Test the connection before continuing. We'll verify credentials and write permissions.</span>}
          </div>
          {!testing && <Button variant="subtle" size="sm" onClick={runTest}>Test now</Button>}
        </div>
      </div>
    </div>
  );
}

// ───────── Step 3: datasets ─────────
function StepDatasets({ selected, setSelected }) {
  const [open, setOpen] = useStateW('accounts');
  const toggle = (id) => setSelected({ ...selected, [id]: !selected[id] });
  return (
    <div style={{ padding: '28px 32px' }}>
      <StepHeader eyebrow="Step 3 · Datasets" title="Pick what to sync" subtitle="Per-dataset sync — choose tables, set cadence, and preview schema. We'll send rows incrementally using the updated_at watermark." />
      <div style={{ marginTop: 20, border: '1px solid #E6E8EC', borderRadius: 10, overflow: 'hidden' }}>
        {DATASETS.map((ds, i) => {
          const isOpen = open === ds.id;
          return (
            <div key={ds.id} style={{ borderTop: i === 0 ? 0 : '1px solid #E6E8EC' }}>
              <div style={{ display: 'grid', gridTemplateColumns: 'auto 1fr auto auto', gap: 14, alignItems: 'center', padding: '14px 16px', background: isOpen ? '#F7F8FA' : '#fff' }}>
                <Checkbox checked={selected[ds.id]} onChange={() => toggle(ds.id)} />
                <div onClick={() => setOpen(isOpen ? null : ds.id)} style={{ cursor: 'pointer' }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                    <div style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 14, color: '#192232' }}>{ds.name}</div>
                    <Pill tone="neutral">{ds.tables.length} tables</Pill>
                  </div>
                  <div style={{ fontSize: 12, color: '#8A9BAE', marginTop: 2 }}>{ds.desc}</div>
                </div>
                <div style={{ fontSize: 12, color: '#4A5568', textAlign: 'right' }}>
                  <div style={{ fontVariantNumeric: 'tabular-nums', fontWeight: 600 }}>{ds.rows}</div>
                  <div style={{ color: '#8A9BAE' }}>{ds.cols} cols</div>
                </div>
                <div onClick={() => setOpen(isOpen ? null : ds.id)} style={{ cursor: 'pointer', color: '#8A9BAE', padding: 4 }}>
                  <Icons.ChevronD size={16} style={{ transform: isOpen ? 'rotate(180deg)' : 'none', transition: 'transform 160ms' }} />
                </div>
              </div>
              {isOpen && SCHEMA[ds.id] && (
                <div style={{ background: '#fff', borderTop: '1px solid #E6E8EC', padding: '0 16px' }}>
                  <div style={{ display: 'grid', gridTemplateColumns: '28px 1.3fr 1fr 2fr', gap: 12, padding: '10px 0', fontSize: 11, fontWeight: 700, letterSpacing: '0.1em', color: '#8A9BAE', textTransform: 'uppercase', borderBottom: '1px solid #F4F4F4' }}>
                    <span /><span>Column</span><span>Type</span><span>Description</span>
                  </div>
                  {SCHEMA[ds.id].map((c) => (
                    <div key={c.col} style={{ display: 'grid', gridTemplateColumns: '28px 1.3fr 1fr 2fr', gap: 12, padding: '8px 0', fontSize: 12, borderBottom: '1px solid #F4F4F4', alignItems: 'center' }}>
                      <span>{c.pk && <Pill tone="teal">PK</Pill>}</span>
                      <span style={{ fontFamily: 'ui-monospace, Menlo, monospace', color: '#192232', fontWeight: 600, display: 'inline-flex', alignItems: 'center' }}>{c.col}{c.governed && <MetricBadge metricKey={c.governed} />}</span>
                      <span style={{ fontFamily: 'ui-monospace, Menlo, monospace', color: '#8A9BAE' }}>{c.type}</span>
                      <span style={{ color: '#4A5568' }}>{c.desc || '—'}</span>
                    </div>
                  ))}
                  {SCHEMA[ds.id] && (
                    <div style={{ padding: '10px 0', fontSize: 12, color: '#8A9BAE' }}>+ {(ds.cols || 0) - SCHEMA[ds.id].length} more columns</div>
                  )}
                </div>
              )}
            </div>
          );
        })}
      </div>
      <div style={{ marginTop: 14, display: 'flex', alignItems: 'center', gap: 10, fontSize: 13, color: '#4A5568' }}>
        <Icons.Info size={14} />
        <span>Approx <b>~{Math.round(Object.entries(selected).filter(([,v])=>v).length * 1.1 * 10)/10}M</b> rows in the first full load · ~410 MB/day incremental</span>
      </div>
    </div>
  );
}

// ───────── Step 4: schedule ─────────
function StepSchedule({ schedule, setSchedule }) {
  return (
    <div style={{ padding: '28px 32px' }}>
      <StepHeader eyebrow="Step 4 · Schedule" title="When and how to sync" />
      <div style={{ marginTop: 20, display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
        <Field label="Cadence">
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 8 }}>
            {[['hourly','Hourly'], ['daily','Daily'], ['weekly','Weekly']].map(([id,l]) => {
              const active = schedule.cadence === id;
              return (
                <div key={id} onClick={() => setSchedule({ ...schedule, cadence: id })} style={{
                  padding: '10px 12px', borderRadius: 8, cursor: 'pointer', textAlign: 'center',
                  border: `1.5px solid ${active?'#13BBB2':'#E6E8EC'}`, background: active?'rgba(19,187,178,.06)':'#fff',
                  fontFamily:'var(--font-display)', fontWeight: 700, fontSize: 13, color:'#192232',
                }}>{l}</div>
              );
            })}
          </div>
        </Field>
        <Field label="Start time (UTC)" hint="Off-hours recommended">
          <Input value={schedule.hour} onChange={(v)=>setSchedule({ ...schedule, hour: v })} icon={<Icons.Clock size={14} />} />
        </Field>
      </div>

      <div style={{ marginTop: 24, borderTop: '1px solid #E6E8EC', paddingTop: 20 }}>
        <div style={{ fontFamily:'var(--font-display)', fontWeight: 700, fontSize: 14, color: '#192232', marginBottom: 10 }}>Load mode</div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
          {[
            { id: 'incremental', label: 'Incremental', hint: 'Only rows changed since last successful sync. Fastest. Uses updated_at watermark.' },
            { id: 'full',        label: 'Full refresh', hint: 'Re-sync the entire table each run. Use when you need snapshot-style truth.' },
          ].map(m => {
            const active = schedule.mode === m.id;
            return (
              <div key={m.id} onClick={() => setSchedule({ ...schedule, mode: m.id })} style={{
                padding: 14, borderRadius: 10, cursor:'pointer',
                border: `1.5px solid ${active?'#13BBB2':'#E6E8EC'}`,
                background: active ? 'rgba(19,187,178,.04)' : '#fff',
                display: 'flex', gap: 12,
              }}>
                <Radio checked={active} />
                <div>
                  <div style={{ fontFamily:'var(--font-display)', fontWeight: 700, fontSize: 13, color:'#192232' }}>{m.label}</div>
                  <div style={{ fontSize: 12, color: '#8A9BAE', marginTop: 2 }}>{m.hint}</div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ───────── Step 5: permissions ─────────
function StepPerms({ perms, setPerms }) {
  return (
    <div style={{ padding: '28px 32px' }}>
      <StepHeader eyebrow="Step 5 · Access" title="Who can manage this export, and how we handle PII" />
      <div style={{ marginTop: 20, display: 'flex', flexDirection: 'column', gap: 14 }}>
        <div style={{ padding: 16, border: '1px solid #E6E8EC', borderRadius: 10 }}>

          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
            {['Admin','RevOps Lead','Data Engineer','Analyst','Marketing Manager'].map(r => {
              const active = perms.roles.includes(r);
              return (
                <span key={r} onClick={() => setPerms({ ...perms, roles: active ? perms.roles.filter(x=>x!==r) : [...perms.roles, r] })}
                  style={{
                    padding: '8px 14px', borderRadius: 999, cursor: 'pointer',
                    background: active ? '#192232' : '#fff',
                    color: active ? '#fff' : '#4A5568',
                    border: `1px solid ${active?'#192232':'#E6E8EC'}`,
                    fontSize: 13, fontWeight: 600, display: 'inline-flex', alignItems: 'center', gap: 6,
                  }}>
                  {active && <Icons.Check size={12} />}{r}
                </span>
              );
            })}
          </div>
        </div>
        <div style={{ padding: 16, border: '1px solid #E6E8EC', borderRadius: 10, display: 'flex', flexDirection: 'column', gap: 14 }}>
          <Toggle checked={perms.piiHash} onChange={(v)=>setPerms({ ...perms, piiHash: v })}
            label="Hash personal identifiers (emails, phone numbers)"
            hint="SHA-256 hashing applied before leaving 6sense. Required for some compliance regimes." />
          <Toggle checked={perms.rowMask} onChange={(v)=>setPerms({ ...perms, rowMask: v })}
            label="Apply row-level masking to EU accounts"
            hint="Mask account_name, domain, and contact fields for accounts with EU-based HQ." />
        </div>
        <div style={{ padding: '14px 16px', borderRadius: 10, background: '#F4F4F4', display: 'flex', gap: 12, fontSize: 13, color: '#4A5568' }}>
          <Icons.Shield size={16} />
          <div>
            Data leaves 6sense over TLS 1.3 from <code style={{ fontFamily:'ui-monospace,Menlo,monospace' }}>egress-us-east-1.6sense.com</code>. We retain a 7-day rolling log of sync metadata — never the row data itself.
          </div>
        </div>
      </div>
    </div>
  );
}

}

          <div style={{ display: 'grid', gridTemplateColumns: '120px 180px 1fr 120px 120px 100px', padding: '10px 20px', background: '#F7F8FA', fontSize: 11, fontWeight: 700, letterSpacing: '0.1em', color: '#8A9BAE', textTransform: 'uppercase' }}>
            <span>Run</span><span>Started</span><span>Status</span><span>Rows</span><span>Size</span><span>Duration</span>
          </div>
          {SYNC_RUNS.map(r => (
            <div key={r.id} style={{ display: 'grid', gridTemplateColumns: '120px 180px 1fr 120px 120px 100px', padding: '12px 20px', fontSize: 13, borderTop: '1px solid #F4F4F4', alignItems: 'start' }}>
              <span style={{ fontFamily:'ui-monospace,Menlo,monospace', color: '#4A5568' }}>#{r.id}</span>
              <span style={{ color:'#4A5568' }}>{r.started}</span>
              <span>
                <span style={{ display: 'inline-flex', gap: 6, alignItems: 'center' }}>
                  <StatusDot status={r.status} />
                  <span style={{ fontWeight: 600, color: r.status==='failed'?'#B42318':r.status==='partial'?'#B7791F':'#15855E' }}>{r.status.replace(/^./,c=>c.toUpperCase())}</span>
                </span>
                {r.note && <div style={{ color: '#8A9BAE', fontSize: 12, marginTop: 4 }}>{r.note}</div>}
              </span>
              <span style={{ fontVariantNumeric: 'tabular-nums', color: '#192232' }}>{r.rows}</span>
              <span style={{ fontVariantNumeric: 'tabular-nums', color: '#4A5568' }}>{r.mb} MB</span>
              <span style={{ color:'#4A5568' }}>{r.duration}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function Kpi({ label, value, sub, tone }) {
  const toneColor = tone === 'warn' ? '#B7791F' : '#192232';
  return (
    <div style={{ background: '#fff', border: '1px solid #E6E8EC', borderRadius: 12, padding: '16px 18px' }}>
      <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.12em', color: '#8A9BAE', textTransform: 'uppercase' }}>{label}</div>
      <div style={{ fontFamily:'var(--font-display)', fontWeight: 800, fontSize: 26, color: toneColor, marginTop: 8, letterSpacing: '-0.02em' }}>{value}</div>
      {sub && <div style={{ fontSize: 12, color: '#8A9BAE', marginTop: 2 }}>{sub}</div>}
    </div>
  );
}

function SparkBars() {
  const data = [
    { h: 72, s: 'success' }, { h: 78, s: 'success' }, { h: 75, s: 'success' },
    { h: 74, s: 'success' }, { h: 80, s: 'success' }, { h: 0,  s: 'failed' },

    { h: 79, s: 'success' }, { h: 78, s: 'success' }, { h: 80, s: 'success' },
    { h: 82, s: 'success' }, { h: 85, s: 'success' },

  const color = { success: '#13BBB2', partial: '#B7791F', failed: '#B42318' };
  return (
    <div style={{ display: 'flex', alignItems: 'flex-end', gap: 8, height: 100 }}>

}

Object.assign(window, { WizardApp, MonitorView });

<script>
(function(){
  const panel = document.getElementById('tw-panel');
  const closeBtn = document.getElementById('tw-close');
  const toggleBtn = document.getElementById('tw-toggle');

  function openPanel() { panel.classList.add('open'); toggleBtn.style.display = 'none'; }
  function closePanel() { panel.classList.remove('open'); toggleBtn.style.display = 'flex'; }

  closeBtn.addEventListener('click', closePanel);
  toggleBtn.addEventListener('click', openPanel);

  document.addEventListener('keydown', (e) => {
    if (e.shiftKey && (e.key === 'T' || e.key === 't')) {
      panel.classList.contains('open') ? closePanel() : openPanel();
    }
  });

  window.addEventListener('message', (e) => {
    const d = e.data || {};
    if (d.type === '__activate_edit_mode') openPanel();
    if (d.type === '__deactivate_edit_mode') closePanel();
  });

  document.querySelectorAll('[data-tweak]').forEach(row => {
    const key = row.getAttribute('data-tweak');
    row.querySelectorAll('.tw-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        row.querySelectorAll('.tw-chip').forEach(c => c.classList.remove('on'));
        chip.classList.add('on');
        const v = chip.getAttribute('data-v');
        if (key === 'layout') {
          const target = v === 'wizard' ? 'wizard' : 'single';
          const btn = document.querySelector('[data-dc-slot="' + target + '"] .dc-expand');
          if (btn) btn.click();
        }
        if (key === 'view' && v === 'monitor') {
          const btn = document.querySelector('[data-dc-slot="monitor"] .dc-expand');
          if (btn) btn.click();
        }
      });
    });
  });
})();
</script>
